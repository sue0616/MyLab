<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password App</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
  <div id="container"></div>

  <script type="text/babel">
    'use strict';

    {
      const App = () => {
        const [result, setResult] = React.useState();
        const [length, setLength] = React.useState(8);
        const [useNumbers, setUseNumbers] = React.useState(false);
        const [useSymbols, setUseSymbols] = React.useState(false);

        React.useEffect(() => {
          generatePassword();
        }, []);

        const generatePassword = () => {
          const letters = 'abcdefghijklmnopqrstuvwxyz';
          const numbers = '0123456789';
          const symbols = '!#$%&()';

          let password = '';
          let seed = letters + letters.toUpperCase();

          if (useNumbers) {
            seed += numbers
          }

          if (useSymbols) {
            seed += symbols
          }

          for (let i = 0; i < length; i++) {
            password += seed[Math.floor(Math.random() * seed.length)];
          }

          setResult(password);
        };

        return (
          <>
            <div className="w-[360px] mx-auto text-center">
              <p className="text-2xl border border-gray-300 p-2">{result}</p>
              <button
                onClick={generatePassword}
                className="w-full text-white bg-violet-500 p-2 mt-2"
              >
                パスワードを生成
              </button>
              <fieldset className="text-left border border-gray-300 mt-2">
                <legend className="ml-4">オプション</legend>
                <ul className="flex gap-4 justify-center pt-2 pb-4">
                  <li className="flex flex-col">
                    長さ({length})
                    <input
                      type="range"
                      min="8"
                      max="16"
                      value={length}
                      onChange={(e) => setLength(e.target.value)}
                    />
                  </li>
                  <li className="flex flex-col">
                    数字
                    <input
                      type="checkbox"
                      checked={useNumbers}
                      onChange={(e) => setUseNumbers(e.target.checked)}
                    />
                  </li>
                  <li className="flex flex-col">
                    記号
                    <input
                      type="checkbox"
                      checked={useSymbols}
                      onChange={(e) => setUseSymbols(e.target.checked)}
                    />
                  </li>
                </ul>
              </fieldset>
            </div>
          </>
        );
      };

      const container = document.querySelector('#container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    }
  </script>
</body>

</html>
