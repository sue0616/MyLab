<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todos App</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
  <div id="container"></div>

  <script type="text/babel">
    'use strict';

    {
      const Todo = (props) => {
        const handleDeleteClick = () => {
          props.onDeleteClick(props.todo.id);
        };

        const handleCheckboxChange = () => {
          props.onCheckboxChange(props.todo.id);
        };

        return (
          <li className="flex justify-between mt-2">
            <label>
              <input
                type="checkbox"
                checked={props.todo.isCompleted}
                onChange={handleCheckboxChange}
                className="mr-1"
              />
              <span className={props.todo.isCompleted ? 'line-through opacity-50' : ''}>{props.todo.title}</span>
            </label>
            <button
              onClick={handleDeleteClick}
              className="text-[12px] border border-gray-300 px-2"
            >Del</button>
          </li>
        );
      };

      const AddForm = (props) => {
        const [title, setTitle] = React.useState('');
        const inputRef = React.useRef(null);

        const handleTextChange = (e) => {
          setTitle(e.currentTarget.value);
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          props.onSubmit(title);
          setTitle('');
          inputRef.current.focus();
        };

        return (
          <form
            onSubmit={handleSubmit}
            className="flex justify-between gap-2 p-2"
          >
            <input
              type="text"
              value={title}
              onChange={handleTextChange}
              ref={inputRef}
              className="w-full border px-2"
            />
            <button className="text-[12px] font-bold bg-gray-300 px-2">Add</button>
          </form>
        );
      };

      const App = () => {
        const [todos, setTodos] = React.useState([]);

        React.useEffect(() => {
          let savedTodos;
          if (localStorage.getItem('todos') === null) {
            savedTodos = [];
          } else {
            savedTodos = JSON.parse(localStorage.getItem('todos'))
          }
          setTodos(savedTodos);
        }, []);

        const updateTodos = (newTodos) => {
          setTodos(newTodos);
          localStorage.setItem('todos', JSON.stringify(newTodos));
        };

        const handlePurgeClick = () => {
          if (!confirm('Sure?')) {
            return;
          }
          const newTodos = todos.filter((todo) => {
            return todo.isCompleted === false
          });
          updateTodos(newTodos);
        };

        const handleAddFormSubmit = (title) => {
          const newTodos = [...todos];
          newTodos.push({
            id: Date.now(),
            title: title,
            isCompleted: false,
          });
          updateTodos(newTodos);
        };

        const handleTodoCheckboxChange = (id) => {
          const newTodos = todos.map((todo) => {
            return {
              id: todo.id,
              title: todo.title,
              isCompleted: todo.id === id ? !todo.isCompleted : todo.isCompleted,
            };
          });
          updateTodos(newTodos);
        };

        const handleTodoDeleteClick = (id) => {
          if (!confirm('Sure?')) {
            return;
          }
          const newTodos = todos.filter((todo) => {
            return todo.id !== id;
          });
          updateTodos(newTodos);
        };

        const todoItems = todos.map((todo) => {
          return (
            <Todo
              key={todo.id}
              todo={todo}
              onDeleteClick={handleTodoDeleteClick}
              onCheckboxChange={handleTodoCheckboxChange}
            />
          );
        });

        return (
          <>
            <div className="w-[360px] mx-auto">
              <h1 className="text-2xl font-bold border-b border-gray-300 flex justify-between p-2">
                Todos
                <button
                  onClick={handlePurgeClick}
                  className="text-[12px] bg-gray-300 px-2"
                >Purge</button>
              </h1>
              <ul
                id="todos"
                className="px-2"
              >
                {todoItems}
              </ul>
              <AddForm
                onSubmit={handleAddFormSubmit}
              />
            </div>
          </>
        );
      };

      const container = document.querySelector('#container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    }
  </script>
</body>

</html>
