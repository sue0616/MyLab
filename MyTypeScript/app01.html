<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omikuji App</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
  <div id="container"></div>

  <script type="text/babel">
    'use strict';

    {
      const { useState, useEffect, useRef } = React;
      const App = () => {
        const [result, setResult] = useState('？');

        const renderResult = () => {
          const results = ['大吉', '中吉', '小吉', '凶'];
          const n = Math.floor(Math.random() * results.length);

          setResult(results[n]);
        };

        return (
          <>
            <div className={`w-[360px] font-bold mx-auto text-center `}>
              <div className={`text-2xl text-red-500 border-4 border-double border-red-500`}>
                <h1 className={`border-b-2 border-red-500 p-2`}>今日の運勢</h1>
                <p className={`text-7xl p-8`}>{result}</p>
              </div>
              <button
                onClick={renderResult}
                className={`w-full text-white bg-red-500 p-2 mt-2`}>おみくじを引く</button>
            </div>
          </>
        );
      };

      const container = document.querySelector('#container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    }
  </script>
</body>

</html>
